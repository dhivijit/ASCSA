# Thresholds configuration

# SDDA - Secret Drift Detection Algorithm Configuration
sdda:
  # Baseline window (days of historical data to consider)
  baseline_window_days: 30  # 7 for fast-moving teams, 90 for legacy repos
  
  # Minimum samples required to establish baseline
  min_samples: 20
  
  # Z-score threshold for anomaly detection
  zscore_threshold: 3.0  # Standard: 3.0 (99.7%), Sensitive: 2.5, Strict: 2.0
  
  # Database path
  db_path: "sdda.db"
  
  # Drift severity thresholds
  severity:
    critical_zscore: 5.0
    high_zscore: 3.5
    medium_zscore: 2.5

# HCRS - Hybrid Code Risk Scoring Configuration (future)
hcrs:
  risk_weights:
    hardcoded_secret: 10
    command_injection: 9
    sql_injection: 8
    
# SLGA - Secret Lineage Graph Configuration (future)
slga:
  max_graph_depth: 5
  enable_log_scanning: true
